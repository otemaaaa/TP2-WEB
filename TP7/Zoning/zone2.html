<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Zoning 2 - Grille</title>
    <link rel="stylesheet" href="../Style/style-zoning2.css">
</head>
<body>
    <div class="conteneur">
        <header class="zone-haut">Zone du haut</header>
        <nav class="zone-menu">Menu</nav>
        
        <main class="grille-centrale">
            <div class="grand-bloc rouge">
                <div class="cellule">P21</div><div class="cellule">P22</div>
                <div class="cellule">P23</div><div class="cellule">P24</div>
            </div>
            <div class="grand-bloc orange">
                <div class="cellule">P25</div><div class="cellule">P26</div>
                <div class="cellule">P27</div><div class="cellule">P28</div>
            </div>
            <div class="grand-bloc vert">
                <div class="cellule">P29</div><div class="cellule">P210</div>
                <div class="cellule">P211</div><div class="cellule">P212</div>
            </div>
            <div class="grand-bloc rouge-fonce">
                <div class="cellule">P213</div><div class="cellule">P214</div>
                <div class="cellule">P215</div><div class="cellule">P216</div>
            </div>
        </main>

        <footer class="zone-bas">Zone de Bas</footer>
    </div>
</body>
</html>
